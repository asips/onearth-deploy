layer_id: "example_layer"
layer_title: "Example Layer"
layer_name: "Example Layer Tileset"
projection: "EPSG:4326"
tilematrixset: "1km"
mime_type: "image/jpeg"
static: true
abstract: "Example layer for testing OnEarth configuration"

source_mrf:
  size_x: 40960
  size_y: 20480
  bands: 3
  tile_size_x: 512
  tile_size_y: 512
  idx_path: "/onearth/idx/epsg4326/example_layer/"
  data_file_uri: "{LOCAL_MRF_ARCHIVE}/epsg4326/example_layer/"
  bbox: -180,-90,180,90
  empty_tile: "/etc/onearth/empty_tiles/Blank_RGB_512.jpg"

metadata:
  - {
      "xlink:type": "simple",
      "xlink:role": "http://earthdata.nasa.gov/gibs/metadata-type/colormap",
      "xlink:href": "https://gibs.earthdata.nasa.gov/colormaps/v1.3/example_layer.xml",
      "xlink:title": "GIBS Color Map: Data - RGB Mapping"
    }
